<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo PWA Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #e2e8f0;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      main {
        max-width: 28rem;
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.35);
      }
      h1 {
        margin-top: 0;
      }
      p {
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Нет сети</h1>
      <p>Локальная очередь задач сохранена. Как только сеть вернётся, приложение синхронизирует изменения с backend.</p>
    </main>
  </body>
</html>
